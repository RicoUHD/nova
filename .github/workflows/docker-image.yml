name: Docker Image

on:
  release:
    types: [published]
  workflow_dispatch: # Allows you to manually trigger a build from the GitHub Actions tab

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            # 1. Applies 'latest' ONLY for full releases or manual triggers
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}
            
            # 2. Applies 'beta' ONLY if the GitHub release is checked as a "pre-release"
            type=raw,value=beta,enable=${{ github.event.release.prerelease == true }}
            
            # 3. Applies the exact version from your Git release tag (e.g., v1.5.0 or v1.6.0-beta.1)
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
